name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  windows-cpu:
    name: Windows CPU-only
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_BINARY_CACHE: ${{ runner.temp }}\vcpkg-binary-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate vcpkg
        shell: pwsh
        run: |
          if (-not $env:VCPKG_ROOT) {
            $env:VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT
          }
          if (-not $env:VCPKG_ROOT) {
            throw "VCPKG_ROOT is not available on this runner"
          }
          "VCPKG_ROOT=$env:VCPKG_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Prepare vcpkg binary cache
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:VCPKG_BINARY_CACHE" | Out-Null
          "VCPKG_BINARY_SOURCES=clear;files,$env:VCPKG_BINARY_CACHE,readwrite" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_BINARY_CACHE }}
          key: ${{ runner.os }}-vcpkg-${{ env.VCPKG_DEFAULT_TRIPLET }}-${{ hashFiles('.github/workflows/ci.yml', 'CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-${{ env.VCPKG_DEFAULT_TRIPLET }}-

      - name: Install dependencies
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\vcpkg.exe" install `
            opencv4 `
            sqlite3 `
            tiff `
            libpng `
            libjpeg-turbo `
            --triplet $env:VCPKG_DEFAULT_TRIPLET

      - name: Release gate
        shell: pwsh
        run: |
          .\scripts\release.ps1 `
            -BuildDir build-ci `
            -Configuration Release `
            -ToolchainFile "$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -NoCuda `
            -PackageSuffix ci-cpu

      - name: Upload release candidate package
        uses: actions/upload-artifact@v4
        with:
          name: Mosaicraft-v${{ github.sha }}-windows-cpu
          path: Mosaicraft_v*_ci-cpu.zip
          if-no-files-found: error
